<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Платежи и ЕПД</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }

        :root {
            --primary: #da822a;
            --primary-light: #ecb726;
            --button: #601f449c;
            --bg: #f8fafc;
            --text: #400a2e;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        .tariff-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tariff-card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        /* Стиль для цветных кружков с ценой */
        .price-badge {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        p{
            text-indent: 2em;
        }
    </style>
</head>

<body class="bg-[var(--bg)] text-[var(--text)]">

<nav class="bg-[var(--card)] border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="font-bold text-[var(--primary)] text-xl">ЖКХ Тверь</div>
        <div class="flex gap-6 text-sm font-semibold">
            <a href="/main" class="hover:text-[var(--primary)]">Главная</a>
            <a href="/tariffs" class="hover:text-[var(--primary)]">Тарифы</a>
            <a href="/faq"  class="hover:text-[var(--primary)]">Вопрос-ответ</a>
            <a href="/complaints"  class="hover:text-[var(--primary)]">Подать жалобу</a>
            <a href="/accruals"  class="hover:text-[var(--primary)]">Проверить начисления</a>
            <a href="/contacts"  class="hover:text-[var(--primary)]">Контакты служб</a>
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto py-12 px-4">

    <h1 class="text-3xl font-bold mb-8">Платежи и ЕПД</h1>

    <div class="space-y-6">
        {{range .States}}
        <div class="card">
            <h3 class="font-bold text-xl mb-2">{{.Header}}</h3>
            <p>{{.Content}}</p>
        </div>
        {{end}}
<!--
        <div class="card">
            <h3 class="font-bold text-xl mb-2">Тарифы</h3>
            <p>Полный текст...</p>
        </div>-->

    </div>

</div>

</body>
