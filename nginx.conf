upstream back{
    server backend:8081;
}

upstream calc{
    server calc:8080;
}

server{

    listen 80;

    location /docs/ {
        alias /docs/;
    }

    location / {
        proxy_pass http://back;
        proxy_http_version 1.1;
    }

    location /calc/{
        proxy_pass http://calc/;
        proxy_http_version 1.1;
    }

    location /api/gkh/ {
        proxy_pass http://calc/api/gkh/;
        proxy_http_version 1.1;
    }
}