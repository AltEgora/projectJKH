services:
  backend:
    build: ./back
    ports:
      - "8081:8081"
    command: go run cmd/main.go
    volumes:
      - ./static:/app/static
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - net
  db:
    image: postgres:latest
    volumes:
      - ./bd/init:/docker-entrypoint-initdb.d
      - ./bd/data:/var/lib/postgresql
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    user: root
    networks:
      - net
  nginx:
    image: nginx:latest
    ports:
      - "81:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docs:/docs
    depends_on:
      - backend
    networks:
      - net

networks:
  net:
    driver: bridge