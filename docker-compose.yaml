services:
  backend:
    build: ./back
    ports:
      - "8081:8081"
    command: go run cmd/main.go
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:latest
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}