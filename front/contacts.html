<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖКХ Тверь — Контакты и службы</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }

        :root {
            --primary: #da822a;
            --primary-light: #ecb726;
            --bg: #f8fafc;
            --text: #400a2e;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: 0.2s;
        }

        .btn-search {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-search:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(218, 130, 42, 0.5);
            transform: translateY(-1px);
        }

        .region-item {
            padding: 10px 14px;
            border-radius: 10px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 16px;
        }

        .region-item:hover {
            background: white;
            border-color: var(--border);
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        #search-result {
            display: none;
            animation: fadeInSlide 0.4s ease-out forwards;
        }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-container {
            width: 100%;
            height: 650px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body class="bg-[var(--bg)] text-[var(--text)] flex flex-col min-h-screen">

<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="font-bold text-[var(--primary)] text-xl tracking-tight">ПроЖКХ</div>
        <div class="flex gap-6 text-sm font-semibold">
            <a href="/" class="hover:text-[var(--primary)]">Главная</a>
            <a href="/tariffs" class="hover:text-[var(--primary)]">Тарифы</a>
            <a href="/faq" class="hover:text-[var(--primary)]">Вопрос-ответ</a>
            <a href="/complaints" class="hover:text-[var(--primary)]">Подать жалобу</a>
            <a href="/calc" class="hover:text-[var(--primary)]">Проверить начисления</a>
            <a href="/contacts" class="text-[var(--primary)] flex items-center gap-1">Контакты служб</a>
        </div>
    </div>
</nav>

<main class="max-w-[1600px] mx-auto px-4 sm:px-8 pt-8 pb-12 flex-grow w-full">
    
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold mb-4 text-[var(--text)] tracking-tight">
            Контакты и справочная служба
        </h1>
    </div>

    <div class="flex flex-col xl:flex-row gap-8 items-start">
        
        <div class="w-full xl:w-1/3 space-y-6">
            <div class="card shadow-sm">
                <div class="flex items-center gap-3 mb-6 text-[var(--primary)]">
                    <i data-lucide="search" class="w-6 h-6"></i>
                    <h3 class="text-xl font-bold text-[var(--text)]">Поиск организации</h3>
                </div>
                
                <div class="space-y-4">
                    <div class="relative">
                        <i data-lucide="map-pin" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="address-input" 
                               placeholder="Арсения Степанова, 52" 
                               class="w-full pl-10 pr-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-[var(--primary)] transition-all bg-slate-50/50">
                    </div>

                    <button onclick="findUK()" class="w-full btn-search py-3.5 rounded-xl font-bold text-sm tracking-wide uppercase">
                        Найти организацию
                    </button>

                    <div id="search-result" class="mt-6 p-5 bg-orange-50/50 border border-orange-100 rounded-2xl">
                        <div class="text-[var(--primary)] font-bold text-[10px] uppercase mb-1">Управляющая компания:</div>
                        <div id="uk-name" class="font-extrabold text-lg mb-3 leading-tight">-</div>
                        <div class="space-y-2 text-sm text-slate-600">
                            <div class="flex items-center gap-3"><i data-lucide="navigation" class="w-4 h-4 text-orange-400"></i> <span id="uk-address">-</span></div>
                            <div class="flex items-center gap-3"><i data-lucide="phone-call" class="w-4 h-4 text-orange-400"></i> <span id="uk-phone" class="font-semibold">-</span></div>
                            <div class="flex items-center gap-3"><i data-lucide="mail" class="w-4 h-4 text-orange-400"></i> <span id="uk-mail">-</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm overflow-hidden">
                <h3 class="font-bold mb-4 flex items-center gap-2 border-b pb-3 text-slate-800">
                    <i data-lucide="map-pinned" class="w-5 h-5 text-[var(--primary)]"></i>
                    Администрации районов
                </h3>
                
                <div class="flex flex-row gap-4 bg-slate-50/50 rounded-xl p-2 min-h-[180px]">
                    <div class="w-2/5 flex flex-col gap-2 border-r border-slate-200 pr-2">
                        <div class="region-item cursor-pointer text-base" data-region="central">Центральный</div>
                        <div class="region-item cursor-pointer text-base" data-region="moscow">Московский</div>
                        <div class="region-item cursor-pointer text-base" data-region="zavolzh">Заволжский</div>
                        <div class="region-item cursor-pointer text-base" data-region="prolet">Пролетарский</div>
                    </div>
                    
                    <div class="w-1/2 pl-2 flex flex-col justify-center" id="region-info">
                        <div class="text-center text-slate-400 text-[10px] italic">
                            Наведите на район в списке слева
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full xl:w-2/3">
            <div class="map-container shadow-md">
                <iframe id="main-map" 
                    src="https://yandex.ru/map-widget/v1/?ll=35.912128%2C56.859611&z=12" 
                    width="100%" height="100%" frameborder="0" allowfullscreen="true">
                </iframe>
            </div>
        </div>

    </div>
</main>

<script>
    lucide.createIcons();

    const ukDatabase = {
        "арсения степанова 52": {
            name: "ООО УК «Заволжье-Групп»",
            address: "ул. Арсения Степанова, д. 52",
            phone: "+7 (4822) 55-66-77",
            mail: "zav-group69@mail.ru",
            mapUrl: "https://yandex.ru/map-widget/v1/?text=Тверь+Арсения+Степанова+52&z=16"
        },
        "арсения степанова 54": {
            name: "УК «Тверь-Сервис»",
            address: "ул. Арсения Степанова, д. 54",
            phone: "+7 (4822) 42-12-34",
            mail: "info@tver-service.ru",
            mapUrl: "https://yandex.ru/map-widget/v1/?text=Тверь+Арсения+Степанова+54&z=16"
        }
    };

    function findUK() {
        const rawInput = document.getElementById('address-input').value;
        const cleanInput = rawInput.toLowerCase().replace(/,/g, '').trim();
        const resultBlock = document.getElementById('search-result');
        const mapFrame = document.getElementById('main-map');
        
        let foundData = null;
        for (let key in ukDatabase) {
            if (cleanInput.includes(key)) { foundData = ukDatabase[key]; break; }
        }

        if (foundData) {
            document.getElementById('uk-name').innerText = foundData.name;
            document.getElementById('uk-address').innerText = foundData.address;
            document.getElementById('uk-phone').innerText = foundData.phone;
            document.getElementById('uk-mail').innerText = foundData.mail;
            resultBlock.style.display = 'block';
            mapFrame.src = foundData.mapUrl;
        } else {
            alert("Попробуйте: Арсения Степанова, 52");
        }
    }

    const regionsData = {
        central: { head: "Людмила Хоменко", phone: "+7 (4822) 36‑08‑81", site: "https://www.tver.ru/administration/structure/administratsiya-tsentralnogo-rayona/" },
        moscow: { head: "Михаил Дроздов", phone: "+7 (4822) 32‑25‑95", site: "https://www.tver.ru/administration/structure/administratsiya-moskovskogo-rayona/" },
        zavolzh: { head: "Богдан Лецин", phone: "+7 (4822) 52‑15‑61", site: "https://www.tver.ru/administration/structure/administratsiya-zavolzhskogo-rayona/" },
        prolet: { head: "Юрий Гаручава", phone: "+7 (4822) 42‑91‑72", site: "https://www.tver.ru/administration/structure/administratsiya-proletarskogo-rayona/" }
    };

    document.querySelectorAll('.region-item').forEach(el => {
        el.addEventListener('mouseenter', () => {
            const r = regionsData[el.dataset.region];
            document.getElementById('region-info').innerHTML = `
                <div class="text-[var(--primary)] font-bold text-sm mb-2">${el.innerText} район</div>
                <div class="text-[16px] text-slate-500 mb-1 leading-tight"><b>Глава:</b><br>${r.head}</div>
                <div class="text-[16px] font-bold text-slate-800 mb-3">${r.phone}</div>
                <a href="${r.site}" target="_blank" class="bg-[var(--primary)] text-white text-[14px] px-2 py-1.5 rounded-lg flex items-center justify-center gap-1 hover:opacity-90 transition-all">
                    Сайт района <i data-lucide="external-link" class="w-3 h-3"></i>
                </a>
            `;
            lucide.createIcons(); // Перерисовываем иконки Lucide внутри динамического HTML
        });
    });
</script>

</body>
</html>
